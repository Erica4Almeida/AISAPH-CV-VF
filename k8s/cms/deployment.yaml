apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms
  namespace: production
spec:
  replicas: 1  # Must stay at 1 — uploads PVC is ReadWriteOnce
  selector:
    matchLabels:
      app: cms
  template:
    metadata:
      labels:
        app: cms
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-0.postgres-headless.production.svc.cluster.local 5432; do
                echo "Waiting for PostgreSQL..."; sleep 3;
              done
      containers:
        - name: cms
          image: registry.sintaxy.com/cvse1/aisaph-cv-vf/cms:latest
          ports:
            - containerPort: 1337
          envFrom:
            - configMapRef:
                name: cms-config
            - secretRef:
                name: cms-secret
          volumeMounts:
            - name: uploads
              mountPath: /opt/app/public/uploads
          livenessProbe:
            httpGet:
              path: /api
              port: 1337
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api
              port: 1337
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: cms-uploads-pvc

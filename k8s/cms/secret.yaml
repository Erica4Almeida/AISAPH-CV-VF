apiVersion: v1
kind: Secret
metadata:
  name: cms-secret
  namespace: production
type: Opaque
# Values are base64-encoded. Generate with: echo -n 'value' | base64
# APP_KEYS: comma-separated list of 4 random 32-char strings (base64 each individually, then the whole comma-joined string)
# Replace ALL placeholder values before applying.
stringData:
  DATABASE_PASSWORD: "CHANGE_ME"        # must match postgres-secret POSTGRES_PASSWORD
  APP_KEYS: "key1,key2,key3,key4"       # 4 random secret strings, comma-separated
  API_TOKEN_SALT: "CHANGE_ME_RANDOM"
  ADMIN_JWT_SECRET: "CHANGE_ME_RANDOM"
  TRANSFER_TOKEN_SALT: "CHANGE_ME_RANDOM"
  JWT_SECRET: "CHANGE_ME_RANDOM"

# Create this secret on the cluster with the command below (do NOT commit credentials to git).
# Use a GitLab Personal Access Token (PAT) with read_registry scope, or your GitLab password
# if 2FA is disabled.
#
# kubectl create secret docker-registry gitlab-registry-secret \
#   --namespace=aisaph \
#   --docker-server=registry.sintaxy.com \
#   --docker-username=<YOUR_GITLAB_USERNAME> \
#   --docker-password=<YOUR_GITLAB_PAT_OR_PASSWORD> \
#   --docker-email=<YOUR_EMAIL>
#
# Verify: kubectl get secret gitlab-registry-secret -n aisaph

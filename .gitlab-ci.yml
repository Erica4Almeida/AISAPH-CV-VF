stages:
  - build
  - deploy

variables:
  IMAGE_CMS: $CI_REGISTRY_IMAGE/cms
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend
  TAG: $CI_COMMIT_REF_NAME-$CI_COMMIT_SHORT_SHA

# ──────────────────────────────────────────────
# TEMPLATES
# ──────────────────────────────────────────────

.build:
  stage: build
  image:
    name: docker
    pull_policy: if-not-present
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

.deploy:
  stage: deploy
  image:
    name: syseleven/kubectl-helm
    entrypoint: [""]
    pull_policy: if-not-present
  before_script:
    - kubectl config use-context $K8S_CONTEXT
  script:
    - kubectl apply -f k8s/namespace.yaml || true
    - kubectl apply -f k8s/postgres/
    - kubectl apply -f k8s/cms/
    - kubectl apply -f k8s/frontend/
    - kubectl apply -f k8s/ingress.yaml
    - kubectl rollout restart deployment/cms -n production
    - kubectl rollout restart deployment/frontend -n production
    - kubectl rollout status deployment/cms -n production --timeout=180s
    - kubectl rollout status deployment/frontend -n production --timeout=120s
  tags:
    - shared

# ──────────────────────────────────────────────
# BUILD JOBS
# ──────────────────────────────────────────────

build-cms:
  extends: .build
  script:
    - docker build -t "$IMAGE_CMS:$TAG" -t "$IMAGE_CMS:latest" ./cms
    - docker push "$IMAGE_CMS:$TAG"
    - docker push "$IMAGE_CMS:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success

build-frontend:
  extends: .build
  script:
    - docker build -t "$IMAGE_FRONTEND:$TAG" -t "$IMAGE_FRONTEND:latest" ./frontend
    - docker push "$IMAGE_FRONTEND:$TAG"
    - docker push "$IMAGE_FRONTEND:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success

# ──────────────────────────────────────────────
# DEPLOY JOBS
# ──────────────────────────────────────────────

deploy-production:
  extends: .deploy
  environment: production
  needs:
    - build-cms
    - build-frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success